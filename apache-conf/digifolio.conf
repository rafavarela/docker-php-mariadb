<VirtualHost *:80>
    ServerName digifolio.docum
    DocumentRoot /var/www/html/digifolio

    <Directory /var/www/html/digifolio>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/digifolio-error.log
    CustomLog ${APACHE_LOG_DIR}/digifolio-access.log combined
</VirtualHost>