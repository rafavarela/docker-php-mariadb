version: '3'
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT}:80"
    volumes:
      - ./php:/var/www/html
      - ./apache-conf:/etc/apache2/sites-enabled
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MARIADB_HOST=${MARIADB_HOST}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}

  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "${MARIADB_PORT}:3306"
    volumes:
      - ./db-data:/var/lib/mysql
      - ./php:/var/www/html
      - ./apache-conf:/etc/apache2/sites-enabled
    command: --group-concat-max-len=4294967295
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: db
    volumes:
      - ./phpmyadmin-conf:/etc/phpmyadmin/config.user.inc.php
    depends_on:
      db:
        condition: service_healthy